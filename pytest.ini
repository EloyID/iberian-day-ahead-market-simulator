[pytest]
# Pytest configuration file for mibel-simulator tests

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests combining multiple components
    slow: Tests that take a long time to run
    requires_data: Tests that require external data files

# Paths
testpaths = tests
pythonpath = src

# Coverage options (if using pytest-cov)
[coverage:run]
source = src/mibel_simulator
omit = 
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
